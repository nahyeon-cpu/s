<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미니 삼목</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f5f7fb;
        color: #172033;
      }
      main {
        width: min(92vw, 420px);
        padding: 20px;
        background: white;
        border: 1px solid #dfe5ef;
        border-radius: 8px;
      }
      h1 { margin: 0 0 16px; }
      .names {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccd5e3;
        border-radius: 6px;
      }
      #message {
        min-height: 48px;
        display: grid;
        place-items: center;
        margin: 12px 0;
        padding: 10px;
        border-radius: 6px;
        background: #172033;
        color: white;
        font-weight: 700;
        text-align: center;
      }
      #board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        aspect-ratio: 1;
      }
      .cell {
        border: 1px solid #ccd5e3;
        border-radius: 6px;
        background: #f9fbff;
        font-size: 48px;
        font-weight: 800;
        cursor: pointer;
      }
      #reset {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>미니 삼목</h1>
      <div class="names">
        <input id="xName" value="플레이어 X" aria-label="X 이름" />
        <input id="oName" value="플레이어 O" aria-label="O 이름" />
      </div>
      <div id="message">플레이어 X 차례</div>
      <div id="board"></div>
      <button id="reset">다시 시작</button>
    </main>

    <script>
      const boardEl = document.querySelector("#board");
      const messageEl = document.querySelector("#message");
      const xName = document.querySelector("#xName");
      const oName = document.querySelector("#oName");
      const reset = document.querySelector("#reset");
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

      let board = Array(9).fill("");
      let turn = "X";
      let done = false;

      function nameOf(mark) {
        return (mark === "X" ? xName.value : oName.value).trim() || `플레이어 ${mark}`;
      }

      function winner() {
        return wins.find(([a, b, c]) => board[a] && board[a] === board[b] && board[a] === board[c]);
      }

      function draw() {
        boardEl.innerHTML = "";
        board.forEach((mark, i) => {
          const cell = document.createElement("button");
          cell.className = "cell";
          cell.textContent = mark;
          cell.disabled = done || Boolean(mark);
          cell.onclick = () => play(i);
          boardEl.append(cell);
        });
      }

      function play(i) {
        if (board[i] || done) return;
        board[i] = turn;
        const line = winner();

        if (line) {
          done = true;
          messageEl.textContent = `${nameOf(turn)} 승리! 축하합니다!`;
        } else if (board.every(Boolean)) {
          done = true;
          messageEl.textContent = "무승부!";
        } else {
          turn = turn === "X" ? "O" : "X";
          messageEl.textContent = `${nameOf(turn)} 차례`;
        }

        draw();
      }

      reset.onclick = () => {
        board = Array(9).fill("");
        turn = "X";
        done = false;
        messageEl.textContent = `${nameOf(turn)} 차례`;
        draw();
      };

      draw();
    </script>
  </body>
</html>
